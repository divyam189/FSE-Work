name : Uses Action
on : push
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name : Checkout code 
        uses : actions/checkout@v4
      
      - name : setup node
        uses : actions/setup-node@v4

      - name : Download dependency
        run : npm i 

      - name : Run tests
        run : npm run test

      - name : list file
        run : ls
        